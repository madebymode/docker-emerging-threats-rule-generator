version: '3'

services:
  emerging-threats-rules:
    # change the GID to match the docker group on the host - using "grep docker /etc/group | cut -d: -f3"
    environment:
      - DOCKER_HOST_GID=1000
      - RUN_AS_ROOT=true
      # Set RESTART_CONTAINERS=false to disable Docker socket usage.
      # When false, the container only writes blocklist.conf and exits without
      # restarting any containers. The docker.sock volume mount can be removed.
      # Use an external cron or orchestrator to reload nginx instead.
      - RESTART_CONTAINERS=true
    image: mxmd/etr:v2
    build: .
    volumes:
      # our config.json
      - ./config.json:/app/config.json:ro
      # named volume for saving rules
      - nginx-blocking-rules:/app/nginx/conf/
      # docker socket for updating nginx - can be removed when RESTART_CONTAINERS=false
      - /var/run/docker.sock:/var/run/docker.sock
  nginx-blacklist:
    depends_on:
      - emerging-threats-rules
    image: nginx:alpine
    volumes:
      - "nginx-blocking-rules:/etc/nginx/conf.d/"
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"
      - "nginx-logs:/var/log/nginx"
    logging:
      driver: "json-file"
      options:
        # Rotate Docker's stdout buffer so it doesn't grow unbounded.
        max-size: "10m"
        max-file: "7"

  log-manager:
    depends_on:
      - nginx-blacklist
    build: ./log-manager
    restart: unless-stopped
    volumes:
      # Shared read-write access to the nginx log volume.
      - "nginx-logs:/var/log/nginx"

volumes:
  nginx-blocking-rules:
  nginx-logs:
