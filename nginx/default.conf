# Flag requests with an empty User-Agent header.
# $blocked_ua is set to "empty-ua" when the UA is absent, "" otherwise.
map $http_user_agent $blocked_ua {
    default  "";
    ""       "empty-ua";
}

# Only log blocked requests (non-200 responses).
map $status $loggable {
    200      0;
    default  1;
}

# Reconstruct method and URL from Traefik's X-Forwarded-* headers.
# Falls back to nginx's native variables when those headers are absent.
map $http_x_forwarded_host $display_method {
    default  "$http_x_forwarded_method";
    ""       "$request_method";
}

map $http_x_forwarded_host $display_url {
    default  "$http_x_forwarded_proto://$http_x_forwarded_host$http_x_forwarded_uri";
    ""       "$request_uri";
}

# JSON log format for Datadog ingestion.
# - escape=json handles special characters in string fields automatically.
# - $time_iso8601 is auto-parsed by Datadog's date remapper.
# - status is unquoted so Datadog treats it as a number (enables range queries).
# - blocked_source and blocked_ua are separate fields for independent facet filtering.
log_format blocklist escape=json
    '{"ip":"$remote_addr",'
     '"time":"$time_iso8601",'
     '"method":"$display_method",'
     '"url":"$display_url",'
     '"status":$status,'
     '"blocked_source":"$blocked_source",'
     '"blocked_ua":"$blocked_ua"}';

server {
    listen 80;
    server_tokens off;
    access_log /dev/stdout blocklist if=$loggable;

    location /check_ip {
        add_header Content-Type "default_type text/plain";

        # Block empty User-Agent first (catches bots/scanners before IP lookup).
        if ($blocked_ua) {
            return 403;
        }

        # Block IPs matched by the generated geo blocklist (blocklist.inc).
        # $blocked_source is "" (falsy) for allowed IPs, or a label like
        # "ipsum-8" / "emerging-block-ips" for blocked ones.
        if ($blocked_source) {
            return 403;
        }

        return 200 "OK";
    }
}

# Trust X-Forwarded-For from internal Docker networks so $remote_addr
# reflects the real client IP rather than the proxy/load-balancer address.
#
# real_ip_recursive on is critical for spoofing-chain protection.
# Without it, nginx uses the rightmost IP in X-Forwarded-For, which is the
# last trusted proxy (e.g., the CDN or Traefik container) — not the client.
# An attacker behind any trusted proxy would bypass the blocklist entirely.
# With recursive on, nginx peels back trusted IPs from the right until it
# finds an IP that is NOT in any set_real_ip_from range; that is used as
# $remote_addr for the geo blocklist lookup.
#
# IMPORTANT — Traefik-side hardening (prevents client-injected XFF chains):
# Configure forwardedHeaders.trustedIPs in your Traefik static config to
# list only your upstream CDN/LB IP ranges. Traefik will then strip any
# X-Forwarded-For headers injected by clients and replace them with the
# real connecting IP, preventing a forged XFF chain from ever reaching nginx.
# Example (traefik.yml):
#   entryPoints:
#     web:
#       forwardedHeaders:
#         trustedIPs:
#           - "127.0.0.1/32"
#           - "10.0.0.0/8"      # upstream LB/CDN
#           - "172.16.0.0/12"   # Docker bridge
real_ip_header      X-Forwarded-For;
real_ip_recursive   on;
set_real_ip_from    10.0.0.0/8;      # Docker host networking & overlay networks
set_real_ip_from    172.16.0.0/12;   # Docker default bridge networks (172.16–172.31)
set_real_ip_from    192.168.0.0/16;  # Docker custom bridge networks
