# Flag requests with an empty User-Agent header.
# $blocked_ua is set to "empty-ua" when the UA is absent, "" otherwise.
map $http_user_agent $blocked_ua {
    default  "";
    ""       "empty-ua";
}

# Custom log format that records the block reason.
# $blocked_source comes from the generated geo blocklist (blocklist.conf).
# $blocked_ua is set above. Concatenating the two works cleanly because
# only one will be non-empty for any given request.
log_format blocklist '$remote_addr - [$time_local] "$request" $status blocked_by="$blocked_source$blocked_ua"';

server {
    listen 80;
    access_log /dev/stdout blocklist;

    location /check_ip {
        add_header Content-Type "default_type text/plain";

        # Block empty User-Agent first (catches bots/scanners before IP lookup).
        if ($blocked_ua) {
            return 403;
        }

        # Block IPs matched by the generated geo blocklist (blocklist.inc).
        # $blocked_source is "" (falsy) for allowed IPs, or a label like
        # "ipsum-8" / "emerging-block-ips" for blocked ones.
        if ($blocked_source) {
            return 403;
        }

        return 200 "OK";
    }
}

# Trust X-Forwarded-For from internal Docker networks so $remote_addr
# reflects the real client IP rather than the proxy/load-balancer address.
real_ip_header      X-Forwarded-For;
set_real_ip_from 172.0.0.0/8;
