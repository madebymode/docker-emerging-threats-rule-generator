version: '3'

# Example: nginx as both the reverse proxy and IP blocker.
# No Traefik needed. The generated blocklist.conf is mounted into the same
# nginx instance that proxies traffic to your application. The geo lookup and
# UA check happen inline — no separate /check_ip hop.
#
# Usage:
#   1. Set DOCKER_HOST_GID: grep docker /etc/group | cut -d: -f3
#   2. Edit nginx/default.conf — update the upstream block to point at your app
#   3. docker compose up

services:
  etr-downloader:
    image: mxmd/etr:v2
    environment:
      - DOCKER_HOST_GID=1003   # grep docker /etc/group | cut -d: -f3
      - RUN_AS_ROOT=false
      - RESTART_CONTAINERS=true
    volumes:
      - ./config.json:/app/config.json:ro
      - nginx-blocking-rules:/app/nginx/conf/
      - /var/run/docker.sock:/var/run/docker.sock

  nginx:
    container_name: etr-nginx-proxy
    depends_on:
      - etr-downloader
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - "nginx-blocking-rules:/etc/nginx/conf.d/"
      - "./nginx/default.conf:/etc/nginx/conf.d/default.conf"

volumes:
  nginx-blocking-rules:
