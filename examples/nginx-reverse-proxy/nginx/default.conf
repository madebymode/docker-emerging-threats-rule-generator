# Flag requests with an empty User-Agent header.
# $blocked_ua is set to "empty-ua" when the UA is absent, "" otherwise.
map $http_user_agent $blocked_ua {
    default  "";
    ""       "empty-ua";
}

# Only log blocked requests (non-200 responses).
map $status $loggable {
    200      0;
    default  1;
}

# JSON log format for structured log pipelines (Datadog, Loki, etc.).
# - escape=json handles special characters automatically.
# - $time_iso8601 is auto-parsed by Datadog's date remapper.
# - status is unquoted so Datadog treats it as a number.
log_format blocklist escape=json
    '{"ip":"$remote_addr",'
     '"time":"$time_iso8601",'
     '"method":"$request_method",'
     '"url":"$scheme://$host$request_uri",'
     '"status":$status,'
     '"blocked_source":"$blocked_source",'
     '"blocked_ua":"$blocked_ua"}';

# Change this to your application's address.
upstream app {
    server your-app:3000;
}

server {
    listen 80;
    server_tokens off;
    access_log /dev/stdout blocklist if=$loggable;

    # Block empty User-Agent first (catches bots/scanners before the geo lookup).
    if ($blocked_ua) {
        return 403;
    }

    # Block IPs matched by the generated geo blocklist (blocklist.conf).
    # $blocked_source is "" (falsy) for allowed IPs, or a label like
    # "ipsum-8" / "emerging-block-ips" for blocked ones.
    if ($blocked_source) {
        return 403;
    }

    location / {
        proxy_pass         http://app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}

# --- Real IP configuration ---
# Only needed if nginx sits behind another upstream proxy (CDN, load balancer).
# If this nginx container is your outermost edge, $remote_addr is already the
# real client IP and these lines can be omitted.
#
# real_ip_recursive on is critical: without it, nginx uses the rightmost IP in
# X-Forwarded-For (the last proxy hop) instead of the actual client.
#
# IMPORTANT — harden your upstream proxy so clients cannot inject a forged
# X-Forwarded-For chain. Configure it to strip and replace X-Forwarded-For
# with the real connecting IP before it reaches nginx.
#
# real_ip_header      X-Forwarded-For;
# real_ip_recursive   on;
# set_real_ip_from    10.0.0.0/8;       # Docker host networking & overlay networks
# set_real_ip_from    172.16.0.0/12;    # Docker default bridge networks
# set_real_ip_from    192.168.0.0/16;   # Docker custom bridge networks
