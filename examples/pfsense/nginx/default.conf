# Flag requests with an empty User-Agent header.
# $blocked_ua is set to "empty-ua" when the UA is absent, "" otherwise.
map $http_user_agent $blocked_ua {
    default  "";
    ""       "empty-ua";
}

# Only log blocked requests (non-200 responses).
map $status $loggable {
    200      0;
    default  1;
}

# JSON log format for structured log pipelines (Datadog, Loki, etc.).
# - escape=json handles special characters automatically.
# - $time_iso8601 is auto-parsed by Datadog's date remapper.
# - status is unquoted so Datadog treats it as a number.
log_format blocklist escape=json
    '{"ip":"$remote_addr",'
     '"time":"$time_iso8601",'
     '"method":"$request_method",'
     '"url":"$scheme://$host$request_uri",'
     '"status":$status,'
     '"blocked_source":"$blocked_source",'
     '"blocked_ua":"$blocked_ua"}';

# Change this to your application's address.
upstream app {
    server your-app:3000;
}

server {
    listen 80;
    server_tokens off;
    access_log /dev/stdout blocklist if=$loggable;

    # Block empty User-Agent first (catches bots/scanners before the geo lookup).
    if ($blocked_ua) {
        return 403;
    }

    # Block IPs matched by the generated geo blocklist (blocklist.conf).
    # $blocked_source is "" (falsy) for allowed IPs, or a label like
    # "ipsum-8" / "emerging-block-ips" for blocked ones.
    if ($blocked_source) {
        return 403;
    }

    location / {
        proxy_pass         http://app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }
}

# pfSense HAProxy adds X-Forwarded-For with the real client IP before forwarding
# to this container. Trust pfSense's LAN interface IP so that nginx resolves
# $remote_addr to the actual client rather than pfSense.
#
# real_ip_recursive on peels back the XFF chain from right to left, skipping
# any address that falls inside a set_real_ip_from range, and stops at the first
# non-trusted address — the real client IP.
#
# IMPORTANT — pfSense HAProxy hardening (prevents forged XFF chains):
# In pfSense → Services > HAProxy > Backend, enable "X-Forwarded-For" header
# insertion using "forwardfor" and set "Forwardfor except" to your pfSense WAN
# interface IP so that HAProxy replaces any client-supplied header rather than
# appending to it. This prevents a client from injecting a spoofed XFF chain.
#
# Update 192.168.1.1 below to match your pfSense LAN interface IP.
real_ip_header      X-Forwarded-For;
real_ip_recursive   on;
set_real_ip_from    192.168.1.1;     # pfSense LAN interface IP — update to match yours
set_real_ip_from    10.0.0.0/8;      # Docker host networking & overlay networks
set_real_ip_from    172.16.0.0/12;   # Docker default bridge networks (172.16–172.31)
